<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avant-Lenz | Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Avant-Lenz</div>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>See the Future</h1>
    <p>AI + AR Glasses enhancing reality</p>
    <button onclick="goToProducts()">Explore Products</button>
</section>

<section class="section">
    <h2>Interactive Features</h2>

    <div class="grid">
        <div class="card">
            <h3>Pricing Calculator</h3>
            <input id="qty" type="number" placeholder="Enter quantity">
            <button onclick="calculatePrice()">Calculate</button>
            <p id="priceResult"></p>
        </div>

        <div class="card">
            <h3>Signup Form</h3>
            <input id="email" placeholder="Email">
            <button onclick="validateEmail()">Submit</button>
            <p id="formMsg"></p>
        </div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
